<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Camera Component</title>
    <style>
      html,body{margin:0;height:100%;background:#000}
      #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
      video{width:100vw;height:100vh;object-fit:cover}
      #controls{position:fixed;left:0;right:0;bottom:28px;display:flex;justify-content:center;gap:16px;z-index:2000}
      .btn{padding:12px 18px;border-radius:10px;font-weight:600;border:none}
      .btn.primary{background:#fff;color:#0b1220}
      .btn.ghost{background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.12)}
      #preview{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:2001}
      #preview img{max-width:95vw;max-height:78vh;object-fit:contain;border-radius:6px}
    </style>
  </head>
  <body>
    <div id="overlay">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div id="preview">
        <img id="previewImg" />
      </div>
      <div id="controls">
        <button id="redo" class="btn ghost">Refazer</button>
        <button id="shutter" class="btn primary">Capturar</button>
        <button id="confirm" class="btn primary" style="display:none">OK</button>
      </div>
    </div>

    <script>
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const preview = document.getElementById('preview');
      const previewImg = document.getElementById('previewImg');
      const shutter = document.getElementById('shutter');
      const redo = document.getElementById('redo');
      const confirm = document.getElementById('confirm');

      let stream = null;

      async function startCamera(){
        try{
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
          video.srcObject = stream;
          // let Streamlit set a good frame height
          if(window.Streamlit){window.Streamlit.setFrameHeight(window.innerHeight)}
        }catch(e){
          console.error('Camera error', e);
          if(window.Streamlit){window.Streamlit.setComponentValue({error: String(e)})}
        }
      }

      function stopCamera(){
        if(stream){
          stream.getTracks().forEach(t=>t.stop());
          stream = null;
        }
      }

      function captureToCanvas(){
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        // target 16:9 landscape
        const targetAspect = 16/9;
        let sw = vw, sh = vh;
        // compute crop box centered to produce 16:9 landscape
        let cropW = vw, cropH = Math.round(vw / targetAspect);
        if(cropH > vh){ cropH = vh; cropW = Math.round(vh * targetAspect); }
        const sx = Math.round((vw - cropW)/2);
        const sy = Math.round((vh - cropH)/2);

        canvas.width = cropW;
        canvas.height = cropH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, sx, sy, cropW, cropH, 0,0, cropW, cropH);
      }

      shutter.addEventListener('click', ()=>{
        // flash effect
        const flash = document.createElement('div');
        flash.style.position='fixed';flash.style.inset='0';flash.style.background='#fff';flash.style.zIndex=2100;flash.style.opacity='0.0';
        document.body.appendChild(flash);
        flash.animate([{opacity:0},{opacity:1},{opacity:0}],{duration:350}).onfinish=()=>{document.body.removeChild(flash)};
        captureToCanvas();
        const data = canvas.toDataURL('image/jpeg', 0.9);
        previewImg.src = data;
        preview.style.display='flex';
        video.style.display='none';
        shutter.style.display='none';
        confirm.style.display='inline-block';
      });

      redo.addEventListener('click', ()=>{
        // reset to live
        preview.style.display='none';
        video.style.display='block';
        shutter.style.display='inline-block';
        confirm.style.display='none';
      });

      confirm.addEventListener('click', ()=>{
        const data = previewImg.src;
        // send to Streamlit
        if(window.Streamlit && Streamlit.setComponentValue){
          Streamlit.setComponentValue(data);
        } else {
          // fallback postMessage
          window.parent.postMessage({type:'camera-capture', data}, '*');
        }
        stopCamera();
      });

      // start immediately
      startCamera();

      // Cleanup when Streamlit tells us to unmount
      if(window.Streamlit && Streamlit.events && Streamlit.events.addEventListener){
        // no-op placeholder; elements will be removed when iframe unmounts
      }
    </script>
  </body>
</html>
