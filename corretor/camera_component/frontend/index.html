<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Camera Component</title>
    <style>
      html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial}
      #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
      video{width:100vw;height:100vh;object-fit:cover}
      /* when device provides portrait frames we rotate the preview to appear landscape */
      video.rotated{transform:rotate(90deg);transform-origin:center center;width:100vh;height:100vw;position:relative;left:0;top:0}
      #controls{position:fixed;left:0;right:0;bottom:28px;display:flex;align-items:center;justify-content:center;gap:20px;z-index:2000}
      .btn{padding:10px 16px;border-radius:999px;font-weight:600;border:none;font-size:15px}
      /* circular shutter */
      #shutter{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff;color:#0b1220;box-shadow:0 6px 18px rgba(0,0,0,0.25);border:none}
      .btn.primary{background:#ffffff;color:#0b1220}
      .btn.ghost{background:transparent;color:#ffffff;border:1px solid rgba(255,255,255,0.16);padding:10px 14px}
      #confirm{background:#10b981;color:#ffffff;border-radius:10px;padding:10px 14px}
      #preview{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:2001}
      #preview img{max-width:95vw;max-height:78vh;object-fit:contain;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.35)}
    </style>
  </head>
  <body>
    <div id="overlay">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div id="preview">
        <img id="previewImg" />
      </div>
      <div id="controls">
        <button id="redo" class="btn ghost">Refazer</button>
        <button id="shutter" class="btn primary">Capturar</button>
        <button id="confirm" class="btn primary" style="display:none">OK</button>
      </div>
    </div>

    <script>
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const preview = document.getElementById('preview');
      const previewImg = document.getElementById('previewImg');
      const shutter = document.getElementById('shutter');
      const redo = document.getElementById('redo');
      const confirm = document.getElementById('confirm');

      let stream = null;
      let rotatedPreview = false;

      async function tryLockOrientation(){
        try{
          // Some browsers require fullscreen to lock orientation
          if(document.documentElement.requestFullscreen){
            await document.documentElement.requestFullscreen();
          }
          if(screen.orientation && screen.orientation.lock){
            await screen.orientation.lock('landscape');
          }
        }catch(e){
          // ignore failures; locking often requires a user gesture or is unsupported
          console.warn('Orientation lock unavailable', e);
        }
      }

      async function startCamera(){
        try{
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 }, aspectRatio: { ideal: 16/9 } }, audio: false });
          video.srcObject = stream;
          // when metadata is loaded we can decide whether to rotate preview/capture
          video.onloadedmetadata = async ()=>{
            // try to lock orientation (best-effort)
            tryLockOrientation();

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            // if camera supplies portrait frames, rotate visually so user sees landscape
            rotatedPreview = vw < vh;
            if(rotatedPreview){
              video.classList.add('rotated');
            }else{
              video.classList.remove('rotated');
            }
            // let Streamlit set a good frame height
            if(window.Streamlit){window.Streamlit.setFrameHeight(window.innerHeight)}
          };
        }catch(e){
          console.error('Camera error', e);
          if(window.Streamlit){window.Streamlit.setComponentValue({error: String(e)})}
        }
      }

      function stopCamera(){
        if(stream){
          stream.getTracks().forEach(t=>t.stop());
          stream = null;
        }
      }

      function captureToCanvas(){
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const targetAspect = 16/9;

        // draw current video frame into a source canvas first
        const src = document.createElement('canvas');
        src.width = vw; src.height = vh;
        const sctx = src.getContext('2d');
        sctx.drawImage(video, 0, 0, vw, vh);

        // if preview was rotated (portrait frame), rotate the source into landscape
        let orientedCanvas = src;
        if(rotatedPreview){
          const rot = document.createElement('canvas');
          rot.width = vh; rot.height = vw; // swapped
          const rctx = rot.getContext('2d');
          // rotate 90deg clockwise
          rctx.translate(rot.width/2, rot.height/2);
          rctx.rotate(90 * Math.PI/180);
          rctx.drawImage(src, -vw/2, -vh/2);
          orientedCanvas = rot;
        }

        const outW = orientedCanvas.width;
        const outH = orientedCanvas.height;
        let cropW = outW;
        let cropH = Math.round(outW / targetAspect);
        if(cropH > outH){ cropH = outH; cropW = Math.round(outH * targetAspect); }
        const sx = Math.round((outW - cropW)/2);
        const sy = Math.round((outH - cropH)/2);

        canvas.width = cropW;
        canvas.height = cropH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(orientedCanvas, sx, sy, cropW, cropH, 0, 0, cropW, cropH);
      }

      shutter.addEventListener('click', ()=>{
        // flash effect
        const flash = document.createElement('div');
        flash.style.position='fixed';flash.style.inset='0';flash.style.background='#fff';flash.style.zIndex=2100;flash.style.opacity='0.0';
        document.body.appendChild(flash);
        flash.animate([{opacity:0},{opacity:1},{opacity:0}],{duration:350}).onfinish=()=>{document.body.removeChild(flash)};
        captureToCanvas();
        const data = canvas.toDataURL('image/jpeg', 0.9);
        previewImg.src = data;
        preview.style.display='flex';
        video.style.display='none';
        shutter.style.display='none';
        confirm.style.display='inline-block';
      });

      redo.addEventListener('click', ()=>{
        // reset to live
        preview.style.display='none';
        video.style.display='block';
        shutter.style.display='inline-block';
        confirm.style.display='none';
      });

      confirm.addEventListener('click', ()=>{
        const data = previewImg.src;
        // send to Streamlit
        if(window.Streamlit && Streamlit.setComponentValue){
          Streamlit.setComponentValue(data);
        } else {
          // fallback postMessage
          window.parent.postMessage({type:'camera-capture', data}, '*');
        }
        stopCamera();
      });

      // start immediately
      startCamera();

      // Cleanup when Streamlit tells us to unmount
      if(window.Streamlit && Streamlit.events && Streamlit.events.addEventListener){
        // no-op placeholder; elements will be removed when iframe unmounts
      }
    </script>
  </body>
</html>
